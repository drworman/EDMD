<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EDMD — Authenticating…</title>
  <style>
    body {
      background: #0d0d0d;
      color: #c8c8c8;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { color: #7ecfff; font-size: 1.2rem; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #888; }
    .ok  { color: #7ed98a; }
    .err { color: #e06c75; }
  </style>
</head>
<body>
  <h1>Elite Dangerous Monitor Daemon</h1>
  <p id="msg">Completing authentication…</p>

  <script>
    // Frontier redirects here with ?code=...&state={port}:{nonce}
    // We extract the port from state and forward everything to EDMD's
    // local listener on 127.0.0.1.

    (function () {
      var params = new URLSearchParams(window.location.search);
      var code   = params.get("code");
      var state  = params.get("state");
      var error  = params.get("error");

      var msg = document.getElementById("msg");

      if (error) {
        msg.className = "err";
        msg.textContent = "Authentication declined: " + error +
          ". You can close this tab.";
        return;
      }

      if (!code || !state) {
        msg.className = "err";
        msg.textContent = "Missing auth parameters. You can close this tab.";
        return;
      }

      // state = "port:nonce"
      var port = state.split(":")[0];
      if (!port || isNaN(parseInt(port, 10))) {
        msg.className = "err";
        msg.textContent = "Invalid state parameter. You can close this tab.";
        return;
      }

      // Forward to EDMD's local listener
      var target = "http://127.0.0.1:" + port + "/callback?" +
        "code=" + encodeURIComponent(code) +
        "&state=" + encodeURIComponent(state);

      msg.textContent = "Sending auth code to EDMD…";

      // Use fetch so we don't navigate away (avoids mixed-content issues
      // in some browsers for http targets).  Fall back to location if blocked.
      fetch(target, { mode: "no-cors" })
        .then(function () {
          msg.className = "ok";
          msg.textContent =
            "Authentication complete. You can close this tab and return to EDMD.";
        })
        .catch(function () {
          // fetch blocked (some browsers disallow http from https page) —
          // fall back to direct navigation which always works.
          window.location.href = target;
        });
    })();
  </script>
</body>
</html>
