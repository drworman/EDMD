<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background radial gradient - deep space -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#060c10"/>
    </radialGradient>

    <!-- Cyan HUD glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>

    <!-- Eye iris gradient -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#0077aa"/>
      <stop offset="100%" stop-color="#003344"/>
    </radialGradient>

    <!-- Pupil depth -->
    <radialGradient id="pupilGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#001820"/>
      <stop offset="100%" stop-color="#000810"/>
    </radialGradient>

    <!-- Glow filter for HUD elements -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for outer ring -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for inner details -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circle">
      <circle cx="256" cy="256" r="252"/>
    </clipPath>
  </defs>

  <!-- Base circle -->
  <circle cx="256" cy="256" r="256" fill="#060c10"/>

  <!-- Background gradient -->
  <circle cx="256" cy="256" r="252" fill="url(#bgGrad)" clip-path="url(#circle)"/>

  <!-- Subtle star field - small dots -->
  <g clip-path="url(#circle)" opacity="0.5">
    <circle cx="80" cy="60" r="1" fill="#ffffff"/>
    <circle cx="140" cy="90" r="1.2" fill="#aaddff"/>
    <circle cx="200" cy="40" r="0.8" fill="#ffffff"/>
    <circle cx="320" cy="70" r="1" fill="#ffffff"/>
    <circle cx="400" cy="50" r="1.3" fill="#aaddff"/>
    <circle cx="450" cy="110" r="0.8" fill="#ffffff"/>
    <circle cx="60" cy="180" r="1" fill="#ffffff"/>
    <circle cx="470" cy="200" r="1.1" fill="#aaddff"/>
    <circle cx="55" cy="350" r="0.9" fill="#ffffff"/>
    <circle cx="460" cy="380" r="1" fill="#ffffff"/>
    <circle cx="90" cy="430" r="1.2" fill="#aaddff"/>
    <circle cx="380" cy="450" r="0.8" fill="#ffffff"/>
    <circle cx="430" cy="420" r="1" fill="#ffffff"/>
    <circle cx="160" cy="470" r="1.1" fill="#aaddff"/>
    <circle cx="300" cy="480" r="0.9" fill="#ffffff"/>
  </g>

  <!-- Outer decorative ring segments (orange) -->
  <!-- Top-right arc segment -->
  <path d="M 256 18 A 238 238 0 0 1 440 100" fill="none" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#ringGlow)" opacity="0.9"/>
  <!-- Bottom-left arc segment -->
  <path d="M 256 494 A 238 238 0 0 1 72 412" fill="none" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#ringGlow)" opacity="0.9"/>

  <!-- Outer decorative ring segments (cyan) -->
  <!-- Top-left arc segment -->
  <path d="M 256 18 A 238 238 0 0 0 72 100" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.7"/>
  <!-- Bottom-right arc segment -->
  <path d="M 256 494 A 238 238 0 0 0 440 412" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.7"/>

  <!-- Corner tick marks - HUD style -->
  <!-- Top left -->
  <line x1="88" y1="108" x2="72" y2="92" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <line x1="72" y1="92" x2="96" y2="92" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <!-- Top right -->
  <line x1="424" y1="108" x2="440" y2="92" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <line x1="440" y1="92" x2="416" y2="92" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <!-- Bottom left -->
  <line x1="88" y1="404" x2="72" y2="420" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <line x1="72" y1="420" x2="96" y2="420" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <!-- Bottom right -->
  <line x1="424" y1="404" x2="440" y2="420" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>
  <line x1="440" y1="420" x2="416" y2="420" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)"/>

  <!-- Horizontal scan lines (HUD atmosphere) -->
  <line x1="72" y1="200" x2="140" y2="200" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="72" y1="210" x2="115" y2="210" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>
  <line x1="372" y1="200" x2="440" y2="200" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="397" y1="210" x2="440" y2="210" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>
  <line x1="72" y1="312" x2="140" y2="312" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="72" y1="302" x2="115" y2="302" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>
  <line x1="372" y1="312" x2="440" y2="312" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="397" y1="302" x2="440" y2="302" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>

  <!-- Eye glow halo behind iris -->
  <circle cx="256" cy="248" r="130" fill="url(#eyeGlow)"/>

  <!-- Hexagonal eye surround - angular ED aesthetic -->
  <!-- Outer hex shape approximated with polygon -->
  <polygon points="256,118 356,178 356,318 256,378 156,318 156,178"
           fill="none" stroke="#00e5ff" stroke-width="2.5"
           filter="url(#cyanGlow)" opacity="0.6"/>

  <!-- Inner hex -->
  <polygon points="256,138 340,188 340,308 256,358 172,308 172,188"
           fill="none" stroke="#00e5ff" stroke-width="1"
           opacity="0.3"/>

  <!-- Iris -->
  <circle cx="256" cy="248" r="108" fill="url(#irisGrad)"/>

  <!-- Iris ring -->
  <circle cx="256" cy="248" r="108" fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#cyanGlow)" opacity="0.9"/>

  <!-- Iris detail rings -->
  <circle cx="256" cy="248" r="90" fill="none" stroke="#00aacc" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="248" r="72" fill="none" stroke="#00aacc" stroke-width="1" opacity="0.3"/>

  <!-- Iris segmentation lines - like a targeting reticle -->
  <line x1="256" y1="140" x2="256" y2="165" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="331" x2="256" y2="356" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="248" x2="173" y2="248" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="339" y1="248" x2="364" y2="248" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Diagonal tick marks on iris ring -->
  <line x1="212" y1="155" x2="220" y2="170" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="155" x2="292" y2="170" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="212" y1="341" x2="220" y2="326" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="341" x2="292" y2="326" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Pupil -->
  <circle cx="256" cy="248" r="52" fill="url(#pupilGrad)"/>
  <circle cx="256" cy="248" r="52" fill="none" stroke="#00ccee" stroke-width="1.5" opacity="0.7"/>

  <!-- Pupil inner glow ring -->
  <circle cx="256" cy="248" r="38" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.4" filter="url(#softGlow)"/>

  <!-- Specular highlight on pupil -->
  <ellipse cx="240" cy="232" rx="12" ry="8" fill="#00e5ff" opacity="0.15"/>
  <ellipse cx="237" cy="230" rx="5" ry="3.5" fill="#ffffff" opacity="0.2"/>

  <!-- Central crosshair dot -->
  <circle cx="256" cy="248" r="4" fill="#00e5ff" filter="url(#softGlow)"/>
  <circle cx="256" cy="248" r="2" fill="#ffffff" opacity="0.9"/>

  <!-- Small crosshair lines through center -->
  <line x1="248" y1="248" x2="244" y2="248" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="264" y1="248" x2="268" y2="248" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="256" y1="240" x2="256" y2="236" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="256" y1="256" x2="256" y2="260" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>

  <!-- Bottom label area - "EDMD" -->
  <rect x="172" y="392" width="168" height="26" rx="2"
        fill="#000d15" stroke="#ff6d00" stroke-width="1.5" opacity="0.9"/>
  <text x="256" y="411" font-family="monospace" font-size="13" font-weight="bold"
        fill="#ff6d00" opacity="0.95" letter-spacing="2"
        text-anchor="middle">EDMD</text>

  <!-- Outer circle border -->
  <circle cx="256" cy="256" r="251" fill="none" stroke="#0a2030" stroke-width="2"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.15"/>
</svg>
